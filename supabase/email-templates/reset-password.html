<!--
  Supabase Email Template: Reset password (重設密碼)
  貼到 Authentication → Emails → Templates → Reset password
  Subject: 【暖暖】重設您的登入密碼
-->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重設暖暖密碼</title>
</head>
<body style="margin:0;padding:0;background:#FAF5EC;font-family:'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;color:#3D2E20;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background:#FAF5EC;padding:40px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width:480px;background:#FFFFFF;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,0.06);overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(135deg,#FFD4A8 0%,#E8845A 100%);padding:40px 32px;text-align:center;">
              <div style="font-size:48px;line-height:1;margin-bottom:8px;">🔒</div>
              <h1 style="margin:0;color:#FFFFFF;font-size:26px;font-weight:800;letter-spacing:1px;">重設密碼</h1>
            </td>
          </tr>

          <tr>
            <td style="padding:36px 32px 24px;text-align:center;">
              <h2 style="margin:0 0 12px;font-size:22px;font-weight:700;color:#3D2E20;">您要求重設密碼</h2>
              <p style="margin:0 0 24px;font-size:16px;color:#6B5848;line-height:1.6;">
                點下面按鈕設定新的密碼
              </p>

              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:18px 48px;background:#E8845A;color:#FFFFFF;text-decoration:none;font-size:17px;font-weight:700;border-radius:999px;box-shadow:0 4px 12px rgba(232,132,90,0.3);margin:8px 0 24px;">
                重設我的密碼
              </a>

              <p style="margin:0 0 12px;font-size:13px;color:#A89580;line-height:1.6;">
                此連結 <strong style="color:#C95E36;">60 分鐘內</strong> 有效
              </p>
              <p style="margin:0;font-size:13px;color:#A89580;">
                如果不是您本人操作，請忽略此封信件
              </p>
            </td>
          </tr>

          <tr>
            <td style="border-top:1px solid #F2E8D5;padding:24px 32px;text-align:center;background:#FAF5EC;">
              <p style="margin:0 0 4px;font-size:13px;color:#6B5848;">暖暖團隊敬上 ❤️</p>
              <p style="margin:0;font-size:12px;color:#A89580;">
                <a href="https://nuan55.com" style="color:#A89580;text-decoration:none;">nuan55.com</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
