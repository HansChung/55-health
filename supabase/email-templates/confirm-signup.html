<!--
  Supabase Email Template: Confirm signup (註冊確認)
  貼到 Authentication → Emails → Templates → Confirm signup
  Subject: 【暖暖】歡迎加入！您的註冊驗證碼是 {{ .Token }}
-->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歡迎加入暖暖</title>
</head>
<body style="margin:0;padding:0;background:#FAF5EC;font-family:'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;color:#3D2E20;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background:#FAF5EC;padding:40px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width:480px;background:#FFFFFF;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,0.06);overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(135deg,#FFD4A8 0%,#E8845A 100%);padding:40px 32px;text-align:center;">
              <div style="font-size:48px;line-height:1;margin-bottom:8px;">🎉</div>
              <h1 style="margin:0;color:#FFFFFF;font-size:26px;font-weight:800;letter-spacing:1px;">歡迎加入暖暖</h1>
              <p style="margin:8px 0 0;color:#FFFFFF;font-size:15px;opacity:0.92;">陪您一起健康變老</p>
            </td>
          </tr>

          <tr>
            <td style="padding:36px 32px 24px;text-align:center;">
              <h2 style="margin:0 0 12px;font-size:22px;font-weight:700;color:#3D2E20;">確認您的 Email</h2>
              <p style="margin:0 0 28px;font-size:16px;color:#6B5848;line-height:1.6;">
                謝謝您註冊暖暖！<br>
                請輸入下方驗證碼完成註冊
              </p>

              <div style="display:inline-block;background:#FAF5EC;border:2px dashed #E8845A;border-radius:16px;padding:20px 36px;margin:0 0 28px;">
                <div style="font-size:36px;font-weight:800;color:#C95E36;letter-spacing:10px;font-family:'Courier New',monospace;">{{ .Token }}</div>
              </div>

              <p style="margin:0 0 24px;font-size:14px;color:#A89580;">
                此驗證碼 <strong style="color:#C95E36;">60 分鐘內</strong> 有效
              </p>

              <div style="text-align:left;background:#FAF5EC;border-radius:12px;padding:20px 24px;margin-top:8px;">
                <p style="margin:0 0 10px;font-size:14px;color:#3D2E20;font-weight:700;">您可以開始使用：</p>
                <p style="margin:6px 0;font-size:14px;color:#6B5848;">📷 拍照記錄飲食</p>
                <p style="margin:6px 0;font-size:14px;color:#6B5848;">💊 拍藥袋管理用藥</p>
                <p style="margin:6px 0;font-size:14px;color:#6B5848;">🎙️ 跟 AI 暖暖聊天</p>
                <p style="margin:6px 0 0;font-size:14px;color:#6B5848;">👨‍👩‍👧 家人共享健康狀況</p>
              </div>
            </td>
          </tr>

          <tr>
            <td style="border-top:1px solid #F2E8D5;padding:24px 32px;text-align:center;background:#FAF5EC;">
              <p style="margin:0 0 4px;font-size:13px;color:#6B5848;">暖暖團隊敬上 ❤️</p>
              <p style="margin:0;font-size:12px;color:#A89580;">
                <a href="https://nuan55.com" style="color:#A89580;text-decoration:none;">nuan55.com</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
